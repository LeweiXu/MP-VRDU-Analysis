# Local REAL run: tiny VLM (Qwen2.5-VL-3B) over oracle pages on the subset.
# This is a code-path / sanity run on a 12GB box, NOT a reportable result —
# the 3B is a stand-in for the 7B/32B that runs on Kaya (Operating Principle 2).
name: local-subset-tinyvlm-oracle-image
seed: 0
data:
  name: mmlongbench-doc
  slice: data/mmlongbench_subset
  max_questions: 6            # keep the local run quick; raise as you like
representation: {parser: pymupdf4llm, chunking: page, dpi: 110}
retrieval: {method: oracle, top_k: 8}
generation:
  modality: image
  generator: local_small_vlm
  model_id: Qwen/Qwen2.5-VL-3B-Instruct
  max_new_tokens: 128
  temperature: 0.0
judge: {type: rule}
