# Sub-study B (document representation) — fix the best text retriever (dense)
# from sub-study A; vary the parser. Text generation so extraction quality
# actually flows to the generator. Compare against pymupdf4llm / tesseract twins.
# Visual retrievers do NOT participate in sub-study B (they ignore parser output).
name: subB-dense-mineru-text
seed: 0
data: {name: mmlongbench-doc, slice: full}
representation: {parser: mineru, chunking: page, dpi: 144}
retrieval:
  method: dense
  top_k: 4
  embedding_model: sentence-transformers/all-mpnet-base-v2
generation:
  modality: text
  generator: kaya_vlm
  model_id: Qwen/Qwen2.5-VL-7B-Instruct
judge: {type: rule}
