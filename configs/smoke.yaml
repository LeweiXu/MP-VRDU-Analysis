# Smoke config: fully offline, everything mocked. Proves the pipeline wires
# end-to-end and emits well-formed JSONL. Uses the synthetic fixture (no dataset
# download, no GPU). NEVER report numbers from this run.
name: smoke
seed: 0

data:
  name: synthetic
  slice: dev

representation:
  parser: pymupdf
  chunking: page
  dpi: 96

retrieval:
  method: oracle      # feed gold pages so the mock(gold) path is exercised
  top_k: 4

generation:
  modality: image
  generator: mock
  mock_mode: gold

judge:
  type: rule
