# Sub-study C (generation modality) — fix retrieval (ColPali) + representation;
# flip the modality across the subC twins (image / text / both). For a VISUAL
# retriever, text/both re-invokes Stage 2 to parse the retrieved pages; the
# default parser used for that is fixed (pymupdf4llm) and stated here.
name: subC-colpali-text
seed: 0
data: {name: mmlongbench-doc, slice: full}
representation: {parser: pymupdf4llm, chunking: page, dpi: 144}
retrieval: {method: colpali, top_k: 4, visual_model: vidore/colpali-v1.3}
generation:
  modality: text          # flip to image / both for the twins
  generator: kaya_vlm
  model_id: Qwen/Qwen2.5-VL-7B-Instruct
judge: {type: rule}
