# Sub-study A — ColPali visual late-interaction (consumes page IMAGES, not the
# text index), image generation block. parser is irrelevant to a visual
# retriever but still set (used only if generation modality were text/both).
name: subA-colpali-image
seed: 0
data: {name: mmlongbench-doc, slice: full}
representation: {parser: pymupdf4llm, chunking: page, dpi: 144}
retrieval:
  method: colpali
  top_k: 4
  visual_model: vidore/colpali-v1.3
generation:
  modality: image
  generator: kaya_vlm
  model_id: Qwen/Qwen2.5-VL-7B-Instruct
judge: {type: rule}
