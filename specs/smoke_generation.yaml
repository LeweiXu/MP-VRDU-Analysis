version: 1
name: smoke-generation-template
run_tag: yaml-smoke
mode: smoke
dataset: mmlongbench

config:
  max_tokens: 64
  visual_resolution: min
  k_values: [1, 3, 5, 7, 9]
  representations: [T, L, V, TL, TV, LV, TLV]

runs:
  - name: G1_sufficiency
    questions:
      limit: 2
    models: [qwen3vl-2b-local]
    cells:
      conditions:
        - type: oracle
      representations: [T, L, V, TL, TV, LV, TLV]

  - name: G5_retrieval
    questions:
      limit: 1
    models: [qwen3vl-2b-local]
    cells:
      conditions:
        - type: retrieved
          retriever: vision
          k: [1, 3, 5, 7, 9]
          name: retrieved_vision_k{k}
        - type: retrieved
          retriever: text
          k: [1, 3, 5, 7, 9]
          name: retrieved_text_k{k}
      representations: [TLV]
    side_artifacts:
      retrieval_eval: true
