# Local correctness test with 2B Qwen3-VL. Covers the parser-free paths the local
# box can run: the G1 ladder at T and V across the resolution sweep, plus the G4
# classifier side task. TL/TLV, G2, and G3 all need the GPU PDF-parser env
# (paddleocrvl), which the local machine doesn't have, so they run on Kaya/H100.
#
#     python -m ops.generate --spec ops/specs/local_test.yaml --allow-unlabelled

base:
  corpus: {sampling: {limit: 5}}
  parser: paddleocrvl
  judge_spec: stub            # judge later with `python -m ops.judge`

runs:
  - task: G1_oracle_ladder
    run_tag: g1-2b
    reasoner_spec: qwen3vl-2b-local
    visual_resolution: low
    representations: [T, TL, TLV, V]
