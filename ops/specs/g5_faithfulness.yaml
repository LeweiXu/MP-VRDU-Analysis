# g5 (E5 faithfulness, both directions): the six-mode prompt sweep on BOTH
# pools. E5 is bidirectional: fabricating where evidence is absent
# (unanswerable pool) and falsely abstaining where it is present (answerable
# pool). Two PENDING runs sharing the mode set, budgets, and delimiter, so the
# two panels of the faithfulness table are directly comparable.
#
#   g3-faithfulness-full  unanswerable pool, same bm25 k=3 page selection as
#     the original run. A NEW tag: the old g3-hallucination-full rows carry
#     no-delimiter/256-budget semantics (run_tag-scoped), and the old tag stays
#     as the reconciliation anchor (grounded/abstain are byte-identical
#     instructions to generic/targeted, so their rates must reproduce).
#   g4-faithfulness-full  answerable pool on ORACLE pages, deliberately: it
#     isolates the prompt from retrieval noise, and the `none` cells reconcile
#     against the G1 headline ladder (31.9 / 39.4 / 56.8 / 45.9).
runs:
  - task_name: G3_hallucination
    run_tag: g3-faithfulness-full
    dataset: [mmlongbench]
    corpus: {scan: any, pool: unanswerable, sampling: full}
    parser_dpi: 200
    parser: [paddleocrvl]
    retrieval_representation: [T]
    text_retrievers: []
    vision_retrievers: []
    joints: []
    k_values: [3]
    joint_k_values: []
    inference_text_retriever: bm25
    inference_vision_retriever: none
    inference_joint: false
    reasoner_spec: [qwen3vl-8b-local]
    quantization: [bf16]
    visual_resolution: [med]
    reasoner_representations: [T, TL, TLV, V]
    prompt_modes: [none, grounded, abstain, abstain_balanced, cot, extract_cot]
    # The reasoning-bearing modes emit reasoning AND an answer; a 256 budget
    # would truncate the answer away and read as "CoT hurts accuracy".
    decode_budget: {default: 256, cot: 1024, extract_cot: 1024}
    final_answer_delimiter: "Answer:"
    classifier: none

  - task_name: G4_faithfulness_answerable
    run_tag: g4-faithfulness-full
    dataset: [mmlongbench]
    corpus: {scan: any, pool: answerable, sampling: full}
    parser_dpi: 200
    parser: [paddleocrvl]
    retrieval_representation: [oracle]
    text_retrievers: []
    vision_retrievers: []
    joints: []
    k_values: []
    joint_k_values: []
    inference_text_retriever: none
    inference_vision_retriever: none
    inference_joint: false
    reasoner_spec: [qwen3vl-8b-local]
    quantization: [bf16]
    visual_resolution: [med]
    reasoner_representations: [T, TL, TLV, V]
    prompt_modes: [none, grounded, abstain, abstain_balanced, cot, extract_cot]
    decode_budget: {default: 256, cot: 1024, extract_cot: 1024}
    final_answer_delimiter: "Answer:"
    classifier: none
