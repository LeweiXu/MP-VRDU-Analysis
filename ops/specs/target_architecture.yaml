# TARGET ARCHITECTURE PROPOSAL (not wired yet) - full per-sweep control of every
# generation task. This is a design mock-up to react to; nothing reads these new
# fields until we implement the loader/driver changes.
#
# Governing idea: our pipeline is a document-understanding pipeline. A "sweep" is
# just the independent variable we change while holding everything else fixed.
# Each generation task (G1/G2/G3) has a `base:` (the single baseline value for
# every axis) plus named SWEEP blocks. A sweep varies ONE axis while everything
# else stays at `base` (the pivot's "one field changed each"; it avoids a
# combinatorial cross-product of coupled axes like resolution-only-matters-at-V).
#
# `base` is NOT a separate run/task. It is the set of default (fallback) values.
# There is exactly one name per axis (no singular-vs-plural split): in `base` it
# holds a single scalar, inside a sweep it holds the list of values to try.
#
# PRECEDENCE (most downstream wins) for any axis of any run:
#   1. the sweep's own value          (source of truth for that sweep)
#   2. else the task `base:` value    (this run's default)
#   3. else the file-level `base:`     (the whole-file default at the bottom)
#
# HOW TO CONTROL A SWEEP:
#   - Keep a sweep with a multi-value list  -> that sweep runs.
#   - Collapse its list to ONE value        -> it degenerates to base (excluded).
#   - Delete / comment the whole sweep block -> excluded entirely.
#   - `enabled: false` on a block           -> excluded but kept for reference.
# Each sweep is its own cache namespace: run_tag = "<base run_tag>-<sweep>".

# ============================================================================ #
# File-level base: the lowest-priority fallback for every run below. Anything a
# run (or a sweep) does not set falls back to here.
# ============================================================================ #
base:
  corpus: {sampling: {per_doc_type: 50, seed: 0}}
  # sampling: {per_bin: 100, seed: 0}  # ~100 questions per bin, drawn as whole documents (doc-coherent subset)
  # sampling: {limit: 4}               # first N questions, for a quick smoke/debug slice
  # sampling: {ids: [q123, q456]}      # an explicit question-id list
  dataset: mmlongbench          # dataset is now spec-controllable
  parser: paddleocrvl
  judge_spec: stub

runs:

  # ========================================================================== #
  # G1 - oracle ladder + all its sweeps
  # ========================================================================== #
  - task: G1_oracle_ladder
    run_tag: g1
    base:
      reasoner_spec: qwen3vl-8b-local
      quantization: bf16          # bf16 | 4bit | 8bit
      visual_resolution: med      # low | med | high
      parser: paddleocrvl         # paddleocrvl | mineru | unlimited
      dataset: mmlongbench        # mmlongbench | longdocurl
      representations: [T, TL, TLV, V]

    sweeps:
      # The headline ladder is always `base`; these are the extra tables. Each
      # block names one axis (singular) and lists the values to try for it.
      size:                       # model-size sweep
        reasoner_spec: [qwen3vl-2b-local, qwen3vl-4b-local, qwen3vl-8b-local, qwen3vl-32b-local]
      family:                     # cross-family replication
        reasoner_spec: [qwen3vl-8b-local, internvl3-8b-local]
      quantization:               # quant sweep (bf16 vs 8bit vs 4bit)
        quantization: [bf16, 8bit, 4bit]
      resolution:                 # resolution sweep - coupled to the vision rungs
        visual_resolution: [low, med, high]
        representations: [TLV, V]     # override: resolution is meaningless at T/TL
      parser:                     # parser comparison - coupled to the parsed rungs
        parser: [paddleocrvl, mineru, unlimited]
        representations: [TL, TLV]
      dataset:                    # held-out dataset replication
        dataset: [mmlongbench, longdocurl]

  # ========================================================================== #
  # G2 - retrieval. TWO explicit stages, each independently controlled.
  # ========================================================================== #
  - task: G2_retrieval
    run_tag: g2

    # ---- Stage 1: retrieval-accuracy benchmark (NO reasoner) ---------------- #
    # Sweeps every listed method x k and writes page P/R/F1 + cost to the
    # retrieval side-artifact. These lists are consumed within this one run (like
    # k_values), so they stay plural: they are the SET of methods to benchmark,
    # not a per-run axis. Include/exclude a method by editing the list.
    retrieval:
      text_retrievers:   [bm25, bge-m3, qwen3-embedding]
      vision_retrievers: [colmodernvbert, colqwen2.5, colqwen3]
      # joint = free deduped union of a text and a vision method's top-k.
      # `matched` auto-pairs cheap|cheap, mid|mid, expensive|expensive; or list
      # explicit pairs. Set to [] to skip joints.
      joints: matched
      # joints: [[bm25, colmodernvbert], [bge-m3, colqwen2.5], [qwen3-embedding, colqwen3]]
      k_values:       [1, 3, 5, 7, 10]
      joint_k_values: [1, 3, 5]

    # ---- Stage 2: inference (reasoner on Stage-1 page sets) ----------------- #
    # Feeds the reasoner the top-k pages from the CHOSEN retriever(s) at each
    # representation, and scores answer accuracy. Reuses the cached rankings from
    # Stage 1, so the picks here MUST be a subset of Stage 1's lists. These are
    # single picks (one text arm, one vision arm), so they are singular.
    inference:
      reasoner_spec:    qwen3vl-8b-local
      visual_resolution: med
      text_retriever:   bm25          # the "cross/text" arm
      vision_retriever: colqwen2.5    # the "matched/vision" arm
      joint:            true          # also feed bm25 u colqwen2.5 (the joint arm)
      k_values:         [1, 3, 5, 7, 10]
      joint_k_values:   [1, 3, 5]
      representations:  [TLV, V]

  # ========================================================================== #
  # G3 - hallucination / prompting (unanswerable subset) + the doc classifier
  # ========================================================================== #
  # G4 is gone as a separate task. Routing accuracy needs no inference of its own
  # (it is a build-time selection over G1's cached rows), so the only GPU work it
  # ever needed was the one-shot domain classifier. That classifier now rides
  # along with G3: G3 is already a small reasoner task, and the classifier is one
  # cheap forward pass per distinct document, so folding it in is practically
  # free. See docs/G4.md.
  - task: G3_hallucination
    run_tag: g3
    base:
      reasoner_spec: qwen3vl-8b-local
      visual_resolution: med
      corpus: {sampling: full}        # full unanswerable pool, not doc_type-sampled
      retriever: bm25                 # similarity page selection (locked: BM25)
      similarity_k: 3
      representation: TLV
      # The document-domain classifier for predicted-domain routing. Runs ONCE
      # over the distinct documents (deduped by doc_id) and writes classifier.jsonl
      # (gold + predicted domain + its own cost) alongside G3's side work. It
      # prices over ALL docs, not just G3's unanswerable pool, because routing is
      # a table over G1's whole doc set. Omit this key (or set `classifier: none`)
      # to skip it: then only the gold-domain routing ceiling is reported.
      classifier: qwen3vl-2b-local
    sweeps:
      prompt:                         # the swept variable for this task
        prompt_mode: [none, generic, targeted]
