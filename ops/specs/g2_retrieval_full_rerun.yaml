# Unblocks: the retrieval-loss column of `attribution`, plus `matched_cross` and
# `kdepth`, all three of which are stamped PROVISIONAL today. The g2-retrieval-full
# generation pool was only ~36% pulled before the cluster migration, with judging
# still in flight and the remainder stranded on the wiped cluster: 4311 ok rows over
# 305 distinct questions, and OOM attrition so uneven that joint k5 at TLV survives
# as 5 cells. One clean run replaces that partial pool.
# Axes mirror kaya_g2_full.yaml exactly; this is the same grid, finished.
# Cells: 847 answerable q x 2 rungs x (3 text + 3 vision) retrievers x 3 k values,
# plus joints at 2 k values, ~= 15.2k inference cells at the 8B reasoner.
# Hardware: A100/H100. On a 16GB V100 the TLV rung at high k is what OOMed in the
# first place, so repeating it on the same card reproduces the same gap.
task_name: G2_retrieval
run_tag: g2-retrieval-full-rerun
dataset: [mmlongbench]
corpus: {scan: any, pool: answerable, sampling: full}
parser_dpi: 200
parser: [paddleocrvl]
retrieval_representation: [T, V]
text_retrievers: [bm25, bge-m3, qwen3-embedding]
vision_retrievers: [colmodernvbert, colqwen2.5, colqwen3]
joints: matched
k_values: [1, 3, 5]
joint_k_values: [1, 3]
inference_text_retriever: bge-m3
inference_vision_retriever: colqwen2.5
inference_joint: true
reasoner_spec: [qwen3vl-8b-local]
quantization: [bf16]
visual_resolution: [med]
reasoner_representations: [TLV, V]
prompt_modes: [none]
classifier: none
