# Cheap visual-retrieval DPI sweep. Retrieval-only (no reasoner, no judge): re-embed
# and re-rank the pages at several render DPIs and compare page P/R/F1. Only vision
# retrieval depends on DPI (text spans are dpi-independent), so this runs the vision
# methods alone. Each DPI keys its own memo (retrieval/<method>__dpi<DPI>.jsonl), so
# the runs never collide and are independently resumable.
#
# Run one pass per DPI, overriding the render DPI on the CLI (the parser_dpi below is
# just the baseline that already exists in g2-retrieval-full):
#
#   for d in 72 110 150; do
#     python -m ops.scripts.complete_retrieval --spec ops/specs/kaya_g2_dpi.yaml \
#       --vision-methods colqwen2.5,colqwen3 --parser-dpi $d --filename retrieval_dpi$d.jsonl
#   done
#
# Then merge the per-DPI files into one retrieval.jsonl under the g2-dpi run_tag and
# build: `ops.build --task G2_retrieval --run-tag g2-dpi` -> the `retrieval_dpi` table.
task_name: G2_retrieval
run_tag: g2-dpi
dataset: [mmlongbench]
corpus: {scan: any, pool: answerable, sampling: full}
parser_dpi: 200
parser: [paddleocrvl]
retrieval_representation: [V]
# Method lists stay empty here: complete_retrieval selects the vision methods from
# --vision-methods on the CLI (empty lists also skip the "benchmark must include the
# fixed inference arms" spec check, which does not apply to this retrieval-only sweep).
text_retrievers: []
vision_retrievers: []
joints: none
k_values: [1, 3, 5]
joint_k_values: []
inference_text_retriever: none
inference_vision_retriever: none
inference_joint: false
reasoner_spec: [qwen3vl-8b-local]
quantization: [bf16]
visual_resolution: [med]
reasoner_representations: [V]
prompt_modes: [none]
classifier: none
