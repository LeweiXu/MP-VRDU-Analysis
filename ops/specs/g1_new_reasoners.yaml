# The pending reasoner rows (extension Stage 6): the Thinking variant, the
# cross-attention Llama family, and the matched-memory 32B pair. Three runs so
# each model's decode budget and OOM behaviour stay independently resumable.
# Characterise OOM on a {limit: N} slice before any full run (H100/A100; none
# of these fit the 16 GB V100 comfortably).
runs:
  # Qwen3-VL-8B-Thinking: value is entirely the hop-split M-S comparison
  # against the Instruct baseline; a pooled accuracy number says nothing. The
  # reasoning block is unconditional, so the default budget is large and the
  # final line is delimiter-extracted at judge time.
  - task_name: G1_oracle_ladder
    run_tag: g1-reasoner-thinking
    dataset: [mmlongbench]
    corpus: {scan: any, pool: answerable, sampling: full}
    parser_dpi: 200
    parser: [paddleocrvl]
    retrieval_representation: [oracle]
    text_retrievers: []
    vision_retrievers: []
    joints: []
    k_values: []
    joint_k_values: []
    inference_text_retriever: none
    inference_vision_retriever: none
    inference_joint: false
    reasoner_spec: [qwen3vl-8b-thinking-local]
    quantization: [bf16]
    visual_resolution: [med]
    reasoner_representations: [T, TL, TLV, V]
    prompt_modes: [none]
    decode_budget: {default: 2048}
    final_answer_delimiter: "Answer:"
    classifier: none

  # Llama-3.2-11B-Vision: cross-attention image conditioning (not in-sequence
  # vision tokens), so the prefill and OOM findings are tested rather than
  # confirmed. It is 11B, not 8B: state that, don't gloss it. Gated repo,
  # prestage needs HF_TOKEN.
  - task_name: G1_oracle_ladder
    run_tag: g1-reasoner-llama
    dataset: [mmlongbench]
    corpus: {scan: any, pool: answerable, sampling: full}
    parser_dpi: 200
    parser: [paddleocrvl]
    retrieval_representation: [oracle]
    text_retrievers: []
    vision_retrievers: []
    joints: []
    k_values: []
    joint_k_values: []
    inference_text_retriever: none
    inference_vision_retriever: none
    inference_joint: false
    reasoner_spec: [llama3.2-11b-vision-local]
    quantization: [bf16]
    visual_resolution: [med]
    reasoner_representations: [T, TL, TLV, V]
    prompt_modes: [none]
    classifier: none

  # Matched-memory pair: 32B at 4-bit (~17 GB) against the existing 8B bf16
  # baseline (~17.5 GB). The bf16 32B rides along for the scale row; any table
  # mixing it with 8B rows must show per-cell n (OOM attrition is not random
  # with respect to the question pool).
  - task_name: G1_oracle_ladder
    run_tag: g1-reasoner-32b-matched
    dataset: [mmlongbench]
    corpus: {scan: any, pool: answerable, sampling: full}
    parser_dpi: 200
    parser: [paddleocrvl]
    retrieval_representation: [oracle]
    text_retrievers: []
    vision_retrievers: []
    joints: []
    k_values: []
    joint_k_values: []
    inference_text_retriever: none
    inference_vision_retriever: none
    inference_joint: false
    reasoner_spec: [qwen3vl-32b-local]
    quantization: [bf16, 4bit]
    visual_resolution: [med]
    reasoner_representations: [T, TL, TLV, V]
    prompt_modes: [none]
    classifier: none
