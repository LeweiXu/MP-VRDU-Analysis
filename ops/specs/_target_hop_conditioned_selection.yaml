# TARGET SPEC - NOT RUNNABLE. The `_target_` prefix marks a proposal for approval,
# not a live run. `oracle_single_page` and `oracle_hop_capped` are not page-selection
# policies the pipeline knows, so the run would fail resolving the conditioner.
#
# WHY IT IS NEEDED: the `integration` table conditions accuracy ON hop, but hop is a
# property of the question, not something the experiment sets. Multi-hop questions are
# harder in ways that have nothing to do with integration (they sit in longer
# documents, they OOM more often, and OOM attrition is itself hop-correlated: the TLV
# rung loses 107 of 343 multi-hop questions but only 7 of 479 single-hop ones). So the
# observed single-minus-multi gap cannot separate "the reasoner fails to combine pages"
# from "multi-hop questions are drawn from a harder pool". Feeding a multi-hop question
# only ONE of its gold pages, versus all of them, holds the question fixed and varies
# only the integration demand. That turns an observational gap into a causal one.
#
# PIPELINE CHANGE ASSUMED: a new InputConditioner (pipeline/conditioner.py) that
# selects a subset of the gold evidence pages rather than all of them, plus the
# `provenance` value naming it so the rows are distinguishable from ordinary oracle
# rows. The covariate itself needs nothing new: `hop` is already materialised on every
# row, and this proposal groups by it exactly as `integration` does.
#
# FROZEN INTERFACE TOUCHED (CODEBASE_GUIDE.md section A1): the InputConditioner ABC is
# one of the Stage-3 frozen pipeline interfaces. Adding an implementation behind the
# existing ABC is the additive case and may be fine; if the policy needs the ABC's
# signature to carry per-question page budgets it is not, and that is the checkpoint.
# `page_indices` is also a cache-key component, so subset-selected cells get their own
# rows and cannot collide with the full-oracle cells. Nothing is invalidated.
#
# Cells if approved: 358 multi-hop q x 2 rungs x 2 policies = 1432.
# Hardware: 1x V100 16GB for TL/TLV; the V rung on long documents wants an A100.
task_name: G1_oracle_ladder
run_tag: _target_hop_conditioned_selection
dataset: [mmlongbench]
corpus: {scan: any, pool: answerable, sampling: full}
parser_dpi: 200
parser: [paddleocrvl]
retrieval_representation: [oracle_single_page, oracle_hop_capped]
text_retrievers: []
vision_retrievers: []
joints: []
k_values: []
joint_k_values: []
inference_text_retriever: none
inference_vision_retriever: none
inference_joint: false
reasoner_spec: [qwen3vl-8b-local]
quantization: [bf16]
visual_resolution: [med]
reasoner_representations: [TL, TLV]
prompt_modes: [none]
classifier: none
