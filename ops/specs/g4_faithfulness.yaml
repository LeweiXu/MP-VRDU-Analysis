# G4: faithfulness on the ANSWERABLE pool, the mirror of G3. Abstaining here is
# an ERROR (the false-abstention cost), which is the missing half of the
# abstention trade-off: an instruction that raises abstention where evidence is
# absent is only useful if it does not also raise it where evidence is present.
#
# Page selection is ORACLE, deliberately: it isolates the prompt from retrieval
# noise (the claim is about the instruction, not the retriever), and it makes
# the prompt_modes `none` cells reconcile against the existing G1 headline
# ladder (31.9 / 39.4 / 56.8 / 45.9) as the Stage-8 anchor. Flipping to the G3
# retrieved setup is a deliberate decision, not a default.
task_name: G4_faithfulness_answerable
run_tag: g4-faithfulness-full
dataset: [mmlongbench]
corpus: {scan: any, pool: answerable, sampling: full}
parser_dpi: 200
parser: [paddleocrvl]
retrieval_representation: [oracle]
text_retrievers: []
vision_retrievers: []
joints: []
k_values: []
joint_k_values: []
inference_text_retriever: none
inference_vision_retriever: none
inference_joint: false
reasoner_spec: [qwen3vl-8b-local]
quantization: [bf16]
visual_resolution: [med]
reasoner_representations: [T, TL, TLV, V]
prompt_modes: [none, grounded, abstain, abstain_balanced, cot, extract_cot]
decode_budget: {default: 256, cot: 1024, extract_cot: 1024}
final_answer_delimiter: "Answer:"
classifier: none
