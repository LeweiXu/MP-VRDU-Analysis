# v4 generation spec template. Copy this, delete what you don't need, and run:
#
#     python -m ops.generate --spec ops/specs/<your>.yaml
#
# A spec declares only what a run varies; anything omitted falls back to the
# config.py default. There is deliberately no machine field: which runs go on
# which box is just which file each machine runs.
#
# Two forms:
#   - Flat (this file): one run, keys at the top level. Simple single-task jobs.
#   - Multi-run (`base:` + `runs:`, shown at the bottom): several runs in one
#     file, each merged over `base` and isolated by its own `run_tag`. This is how
#     a task is split into chunks, e.g. a G1 size sweep in one run plus one run per
#     resolution. See kaya.yaml / h100.yaml for the real split.
#
# Every key below is optional except `task`. The values shown are the full set of
# choices for each field.

# --- what runs -------------------------------------------------------------

# task: which generation task, a group, or a comma-separated list of either.
#   G1_oracle_ladder      oracle pages x the ladder (the reasoning core + its sweeps)
#   G2_retrieval          retrieved pages x TLV, matched-vs-cross, k-sweep (+ retrieval eval side artifact)
#   G3_hallucination      unanswerable questions x similarity pages x prompt sweep
#   G4_classifier_pricing side-only: prices the bin classifier (no reasoner cells)
#   reasoners             group: G1_oracle_ladder, G2_retrieval, G3_hallucination
#   all                   group: all four tasks
task: G1_oracle_ladder

# representations: any subset of the four cost-ordered rungs, in any order.
#   T   cheap embedded text (PyMuPDF)
#   TL  parser markdown text (uses `parser` below)
#   TLV parser text + page image
#   V   page image only
representations: [T, TL, TLV, V]

# --- corpus scope ----------------------------------------------------------

# Pick exactly one sampling mode. The task binds the pool: G1/G2 draw from the
# answerable questions, G3 from the unanswerable ones, so a spec can't cross over.
corpus:
  sampling: full                       # every question in the task's pool (the full run)
  # sampling: {per_bin: 100, seed: 0}  # ~100 questions per bin, drawn as whole documents (doc-coherent subset)
  # sampling: {limit: 4}               # first N questions, for a quick smoke/debug slice
  # sampling: {ids: [q123, q456]}      # an explicit question-id list

# --- reasoner --------------------------------------------------------------

# reasoner_spec: the single model a run uses when it is not sweeping. Specs are
# `qwen3vl-<size>-local` for size in {2b, 4b, 8b, 32b}, or `internvl3-8b-local`
# for the family replication.
reasoner_spec: qwen3vl-8b-local

# reasoner_specs: an explicit list turns the run into a model sweep. The driver
# runs one pass per spec and frees the GPU between them, and each spec keys its
# own cache rows. Leave it out (or empty) to use the single reasoner_spec above.
# This is how the size sweep runs (see size_sweep.yaml):
# reasoner_specs: [qwen3vl-2b-local, qwen3vl-4b-local, qwen3vl-8b-local, qwen3vl-32b-local]

# quantization: bitsandbytes for the local reasoner. Omit for bf16. When set it is
# appended to every reasoner spec (`-4bit`/`-8bit`) so quantized rows cache apart.
# quantization: 4bit    # or: 8bit

# --- representation knobs --------------------------------------------------

# parser: the PDF parser feeding TL/TLV text. Only matters if TL or TLV is in the
# rung list. Each parser lives in its own env (envs/parse-<parser>).
#   paddleocrvl | mineru | unlimited
parser: paddleocrvl

# visual_resolution: the per-page vision-token budget preset for a run that is not
# sweeping resolution. Only matters if TLV or V is in the rung list.
#   low | med | high
visual_resolution: med

# visual_resolutions: a list turns resolution into a per-cell sweep. The reasoner
# runs every cell once per preset, and the preset is part of the cell key, so the
# presets never collide. Use [TLV, V] rungs with it (T/TL carry no image). Leave
# it out to just use visual_resolution above.
# visual_resolutions: [low, med, high]

# dpi: the resolution the PDF pages are rendered at before anything sees them.
# This is the OCR/parser input resolution; the VLM downsamples to the preset
# above, so dpi mainly affects TL/TLV parse quality. Default is 200.
# dpi: 200

# --- retrieval (G2 only) ---------------------------------------------------

# k_values: the top-k depths the retrieval sweep runs. Ignored by G1/G3/G4.
k_values: [1, 3, 5, 7, 10]

# --- judging + bookkeeping -------------------------------------------------

# judge_spec: generation normally leaves this at `stub` and scores later with a
# separate `python -m ops.judge` pass. Set it only to judge inline during
# generation.
#   stub | gemini | gpt4o-mini
judge_spec: stub

# run_tag: a per-run cache namespace nested under results/cache/v4/<run_tag>/, so
# two runs that select the same task never write the same files. The judge and
# build steps must be given the same tag. Alphanumeric plus dash/underscore.
run_tag: yaml-template

# conditions: advanced. Overrides ExperimentConfig.conditions. The built-in tasks
# choose their conditioners directly (oracle for G1, retrieved for G2, similarity
# for G3), so this does not change their cell grids; leave it out unless you know
# you need it.
# conditions: [oracle, retrieved, full, similarity]


# ===========================================================================
# Multi-run form: `base:` + `runs:` (use INSTEAD of the flat keys above)
# ===========================================================================
#
# Every run entry is merged over `base` (run keys win), so put shared knobs in
# `base` and the per-run differences in each entry. Each run must set a unique
# `run_tag` (its cache namespace) so the runs never overwrite each other. A run's
# `task` may be a single task, a group, or a comma list, same as the flat form.
#
# Notes for splitting G1: both size and resolution are part of the cache key, so
#   - a size sweep is ONE run with a `reasoner_specs` list, and
#   - a resolution sweep is ONE run with a `visual_resolutions` list ([TLV, V]
#     rungs, since T/TL carry no image).
# To split a sweep across machines, give each machine's file the same run_tag but
# a different slice of the list; the machine-independent keys merge cleanly.
#
# base:
#   corpus: {sampling: full}
#   parser: paddleocrvl
#   judge_spec: stub
# runs:
#   - task: G1_oracle_ladder            # size sweep at the deployment resolution
#     run_tag: g1-size
#     reasoner_specs: [qwen3vl-2b-local, qwen3vl-4b-local, qwen3vl-8b-local, qwen3vl-32b-local]
#     visual_resolution: med
#     representations: [T, TL, TLV, V]
#   - task: G1_oracle_ladder            # resolution sweep at 8B
#     run_tag: g1-res
#     reasoner_spec: qwen3vl-8b-local
#     representations: [TLV, V]
#     visual_resolutions: [low, med, high]
#   - {task: G2_retrieval, run_tag: g2, reasoner_spec: qwen3vl-8b-local, k_values: [1, 3, 5, 7, 10]}
#   - {task: G4_classifier_pricing, run_tag: g4}
