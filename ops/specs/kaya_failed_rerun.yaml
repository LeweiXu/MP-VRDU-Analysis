# Rerun of the cells that FAILED (not OOM) in the 2026-07-14 verification sweep.
# Submit with --failed-only so only the recorded failures re-run; the run configs
# below are verbatim copies of the original specs so the cache keys line up and
# --failed-only finds exactly those cells.
#
#   kaya submit --no-wait --gres gpu:v100:2 --time 24:00:00 ops/generate.py -- \
#       --spec ops/specs/kaya_failed_rerun.yaml --failed-only
#
# Three failure types, across four run_tags (InternVL spans digital + scanned):
#   1. InternVL3-8B ImportError (einops) -> g1-reasoner-full + g1-reasoner-scanned.
#      FIXED: einops added to core.txt and installed in envs/core; verified with
#      transformers check_imports (all InternVL modeling files now import cleanly).
#   2. CUDA "unspecified launch failure" -> g1-resolution-full (488 cells). A node/GPU
#      fault mid-run; a rerun on a healthy node should pass.
#   3. g3 image-placeholder mismatch -> g3-hallucination-full (18 cells = 2 docs:
#      mmlongbench:000754, :000758). FIXED in code: 2306.05425v1.pdf (a VLM paper) has
#      literal "<image>" in its text, which collided with the IMAGE_PLACEHOLDER sentinel;
#      to_local_prompt now neutralises it. The rerun picks up the fix (source is pushed
#      on submit), so these 18 now pass.
#
# InternVL3-8B is 8B in bf16 -> needs 2xV100. Also do the OOM tail separately.

runs:

  # -- 1a. InternVL einops fix, digital reasoner -------------------------------------
  - task_name: G1_oracle_ladder
    run_tag: g1-reasoner-full
    dataset: [mmlongbench]
    corpus: {scan: digital, pool: answerable, sampling: full}
    parser_dpi: 200
    parser: [paddleocrvl]
    retrieval_representation: [oracle]
    text_retrievers: []
    vision_retrievers: []
    joints: []
    k_values: []
    joint_k_values: []
    inference_text_retriever: none
    inference_vision_retriever: none
    inference_joint: false
    reasoner_spec: [qwen3vl-2b-local, qwen3vl-4b-local, internvl3-8b-local]
    quantization: [bf16]
    visual_resolution: [med]
    reasoner_representations: [T, TL, TLV, V]
    prompt_modes: [none]
    classifier: none

  # -- 1b. InternVL einops fix, scanned reasoner ------------------------------------
  - task_name: G1_oracle_ladder
    run_tag: g1-reasoner-scanned
    dataset: [mmlongbench]
    corpus: {scan: scanned, pool: answerable, sampling: full}
    parser_dpi: 200
    parser: [paddleocrvl]
    retrieval_representation: [oracle]
    text_retrievers: []
    vision_retrievers: []
    joints: []
    k_values: []
    joint_k_values: []
    inference_text_retriever: none
    inference_vision_retriever: none
    inference_joint: false
    reasoner_spec: [qwen3vl-2b-local, qwen3vl-4b-local, internvl3-8b-local]
    quantization: [bf16]
    visual_resolution: [med]
    reasoner_representations: [T, TL, TLV, V]
    prompt_modes: [none]
    classifier: none

  # -- 2. CUDA launch faults, resolution ladder -------------------------------------
  - task_name: G1_oracle_ladder
    run_tag: g1-resolution-full
    dataset: [mmlongbench]
    corpus: {scan: digital, pool: answerable, sampling: full}
    parser_dpi: 200
    parser: [paddleocrvl]
    retrieval_representation: [oracle]
    text_retrievers: []
    vision_retrievers: []
    joints: []
    k_values: []
    joint_k_values: []
    inference_text_retriever: none
    inference_vision_retriever: none
    inference_joint: false
    reasoner_spec: [qwen3vl-8b-local]
    quantization: [bf16]
    visual_resolution: [low, med, high]
    reasoner_representations: [TLV, V]
    prompt_modes: [none]
    classifier: none

  # -- 3. g3 image-placeholder (2 docs; likely re-fails without a render fix) --------
  - task_name: G3_hallucination
    run_tag: g3-hallucination-full
    dataset: [mmlongbench]
    corpus: {scan: any, pool: unanswerable, sampling: full}
    parser_dpi: 200
    parser: [paddleocrvl]
    retrieval_representation: [T]
    text_retrievers: []
    vision_retrievers: []
    joints: []
    k_values: [3]
    joint_k_values: []
    inference_text_retriever: bm25
    inference_vision_retriever: none
    inference_joint: false
    reasoner_spec: [qwen3vl-8b-local]
    quantization: [bf16]
    visual_resolution: [med]
    reasoner_representations: [T, TL, TLV, V]
    prompt_modes: [none, generic, targeted]
    classifier: qwen3vl-2b-local
