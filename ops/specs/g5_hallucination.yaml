# g5 (E5 faithfulness): the original three-mode abstention run on the
# UNANSWERABLE pool (bm25 similarity k=3, four rungs). DONE and judged
# (run_tag g3-hallucination-full); kept as the run of record and the source of
# the Stage-8 abstention anchors (pooled none 16.9 / generic 10.7 /
# targeted 80.7). The six-mode replacement is g5_faithfulness.yaml.
task_name: G3_hallucination
run_tag: g3-hallucination-full
dataset: [mmlongbench]
corpus: {scan: any, pool: unanswerable, sampling: full}
parser_dpi: 200
parser: [paddleocrvl]
retrieval_representation: [T]
text_retrievers: []
vision_retrievers: []
joints: []
k_values: [3]
joint_k_values: []
inference_text_retriever: bm25
inference_vision_retriever: none
inference_joint: false
reasoner_spec: [qwen3vl-8b-local]
quantization: [bf16]
visual_resolution: [med]
reasoner_representations: [T, TL, TLV, V]
prompt_modes: [none, generic, targeted]
classifier: qwen3vl-2b-local
