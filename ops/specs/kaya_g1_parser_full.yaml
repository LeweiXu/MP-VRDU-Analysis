# G1 parser comparison: oracle TL/TLV over all answerable questions (scan:any),
# swept across the three VLM parsers. The parser is not in the prediction cache key,
# so each parser must land in its own run_tag; the spec loader does this automatically
# by suffixing the run_tag when `parser:` is a list, giving:
#   g1-parser-full-paddleocrvl  g1-parser-full-mineru  g1-parser-full-unlimited
# scan:any answerable = 847 questions; TL + TLV = 2 rungs; 3 parsers -> 5082 reasoner
# cells total (the runs execute in order). Only the gold evidence pages are parsed, so
# parser warming is modest, but mineru/unlimited need their isolated envs on Kaya
# (envs/parse-mineru, envs/parse-unlimited).
task_name: G1_oracle_ladder
run_tag: g1-parser-full
dataset: [mmlongbench]
corpus: {scan: any, pool: answerable, sampling: full}
parser_dpi: 200
parser: [mineru, unlimited]
retrieval_representation: [oracle]
text_retrievers: []
vision_retrievers: []
joints: []
k_values: []
joint_k_values: []
inference_text_retriever: none
inference_vision_retriever: none
inference_joint: false
reasoner_spec: [qwen3vl-8b-local]
quantization: [bf16]
visual_resolution: [med]
reasoner_representations: [TL, TLV]
prompt_modes: [none]
classifier: none
