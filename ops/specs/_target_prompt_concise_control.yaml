# TARGET SPEC - NOT RUNNABLE. The `_target_` prefix marks a proposal for approval,
# not a live run. Do not pass this to the driver; `concise` is not a prompt mode the
# pipeline knows, so the run would fail at spec validation.
#
# WHY IT IS NEEDED: the three existing prompt modes confound two instructions.
# `generic` says "use only the provided evidence and keep the answer concise";
# `targeted` says the same PLUS "if the evidence does not contain the answer, answer
# exactly: Not answerable". So any accuracy or abstention difference between them
# mixes the brevity instruction with the permission to abstain, and RQ3 cannot say
# which lever moved the number. A concise-but-no-abstain arm separates them: it is
# `targeted` minus the abstention sentence. Without it, the prompt lever result is
# "an instruction bundle helped", not "abstention permission helped".
#
# PIPELINE CHANGE ASSUMED: one new entry in config.PROMPT_MODES (config.py:61), e.g.
#   "concise": "Use only the provided document evidence. Keep the answer concise."
# and the matching addition to G3_PROMPT_MODES so the unanswerable pool can run it.
#
# FROZEN INTERFACE TOUCHED (CODEBASE_GUIDE.md section A1): the prompt mode rides in
# the `condition` suffix (`<base>__<prompt_mode>`), and `condition` is one of the
# seven components of the cell cache key (experiments/engine/paths.py:29). A new mode
# therefore extends the cache-key value space. It does NOT change the key's shape, so
# existing cells keep their identity and nothing is invalidated, but adding a value to
# a frozen key component is a checkpoint conversation, not a silent edit.
#
# Cells if approved: 244 unanswerable q x 1 rung x 1 new mode = 244, plus 847 x 1 x 1
# = 847 on the answerable side to read the same arm against g1-prompting-answerable.
# Hardware: 1x V100 16GB.
task_name: G3_hallucination
run_tag: _target_prompt_concise_control
dataset: [mmlongbench]
corpus: {scan: any, pool: unanswerable, sampling: full}
parser_dpi: 200
parser: [paddleocrvl]
retrieval_representation: [T]
text_retrievers: []
vision_retrievers: []
joints: []
k_values: [3]
joint_k_values: []
inference_text_retriever: bm25
inference_vision_retriever: none
inference_joint: false
reasoner_spec: [qwen3vl-8b-local]
quantization: [bf16]
visual_resolution: [med]
reasoner_representations: [TLV]
prompt_modes: [none, generic, concise, targeted]
classifier: none
