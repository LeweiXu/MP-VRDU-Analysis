# g3 (E3 fidelity): the representation ladder T/TL/TLV/V on oracle pages, the
# headline run and the substrate for the fidelity transitions. DONE and judged
# (run_tag g1-representation-full, scan:any). Its scanned half also feeds the
# E1 scanned-vs-digital analysis, and its hop covariate the E4 integration
# tables; the 8B bf16 med/paddle baseline every g0 intervention compares
# against lives here.
task_name: G1_oracle_ladder
run_tag: g1-representation-full
dataset: [mmlongbench]
corpus: {scan: any, pool: answerable, sampling: full}
parser_dpi: 200
parser: [paddleocrvl]
retrieval_representation: [oracle]
text_retrievers: []
vision_retrievers: []
joints: []
k_values: []
joint_k_values: []
inference_text_retriever: none
inference_vision_retriever: none
inference_joint: false
reasoner_spec: [qwen3vl-8b-local]
quantization: [bf16]
visual_resolution: [med]
reasoner_representations: [T, TL, TLV, V]
prompt_modes: [none]
classifier: none
