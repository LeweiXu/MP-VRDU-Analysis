# Judge/build helper: mineru parser run only (run_tag g1-parser-full-mineru), so the
# judge phase can score mineru WITHOUT touching g1-parser-full-unlimited (whose local
# cache still holds stale error rows while its Kaya rerun is in flight). Explicit
# run_tag so a single-parser list targets the existing mineru cache.
task_name: G1_oracle_ladder
run_tag: g1-parser-full-mineru
dataset: [mmlongbench]
corpus: {scan: any, pool: answerable, sampling: full}
parser_dpi: 200
parser: [mineru]
retrieval_representation: [oracle]
text_retrievers: []
vision_retrievers: []
joints: []
k_values: []
joint_k_values: []
inference_text_retriever: none
inference_vision_retriever: none
inference_joint: false
reasoner_spec: [qwen3vl-8b-local]
quantization: [bf16]
visual_resolution: [med]
reasoner_representations: [TL, TLV]
prompt_modes: [none]
classifier: none
