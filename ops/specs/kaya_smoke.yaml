# Kaya smoke: all three tasks with one question from each native document type.
# This is not a scientific run. It checks parser warming, all six retrievers,
# joint retrieval, reasoner inference, prompting, and side artifacts end to end.
#
#     python -m ops.generate --spec ops/specs/kaya_smoke.yaml

base:
  corpus: {sampling: {per_doc_type: 1, seed: 0}}
  dataset: mmlongbench
  parser: paddleocrvl
  judge_spec: stub

runs:
  - task: G1_oracle_ladder
    run_tag: g1-perdoctype1-smoke
    base:
      reasoner_spec: qwen3vl-2b-local
      visual_resolution: med
      representations: [T, TL, TLV, V]

  - task: G2_retrieval
    run_tag: g2-perdoctype1-smoke
    retrieval:
      text_retrievers: [bm25, bge-m3, qwen3-embedding]
      vision_retrievers: [colmodernvbert, colqwen2.5, colqwen3]
      joints: matched
      k_values: [1]
      joint_k_values: [1]
    inference:
      reasoner_spec: qwen3vl-2b-local
      visual_resolution: med
      text_retriever: bm25
      vision_retriever: colqwen2.5
      joint: true
      k_values: [1]
      joint_k_values: [1]
      representations: [TLV]

  - task: G3_hallucination
    run_tag: g3-perdoctype1-smoke
    base:
      reasoner_spec: qwen3vl-2b-local
      visual_resolution: med
      classifier: qwen3vl-2b-local
      representations: [TLV]
    sweeps:
      prompt:
        prompt_mode: [none, generic, targeted]
