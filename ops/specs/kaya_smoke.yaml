# Kaya smoke: a fast code-path shakeout of all three tasks (2B reasoner, just 2
# questions each via a fixed limit), with distinct `*-smoke` run_tags so it never
# collides with the real run's cache. Not a scientific run: the point is to prove
# G1/G2/G3 write well-formed rows end to end (parser warm, retrieval + joint,
# the six-method retrieval side-artifact, TLV/V inference, the three G3 prompts).
#
#     python -m ops.generate --spec ops/specs/kaya_smoke.yaml

base:
  corpus: {sampling: {limit: 2}}
  parser: paddleocrvl
  judge_spec: stub

runs:
  - task: G1_oracle_ladder
    run_tag: g1-doctype50-smoke
    reasoner_specs: [qwen3vl-2b-local]
    visual_resolution: med
    representations: [T, TL, TLV, V]

  - task: G2_retrieval
    run_tag: g2-doctype50-smoke
    reasoner_spec: qwen3vl-2b-local
    visual_resolution: med
    representations: [TLV, V]
    k_values: [1, 3, 5]

  - task: G3_hallucination
    run_tag: g3-full-smoke
    reasoner_spec: qwen3vl-2b-local
    visual_resolution: med
