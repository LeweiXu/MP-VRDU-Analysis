# G1 smoke: oracle ladder end-to-end on one V100 with the 2B reasoner and one
# question per doc_type. Some TLV/V cells may OOM on 16 GB; that is expected and
# exercises graceful per-cell failure + continuation.
task_name: G1_oracle_ladder
run_tag: g1-smoke
dataset: [mmlongbench]
corpus: {scan: any, pool: answerable, sampling: {per_doc_type: 1, seed: 0}}
parser_dpi: 200
parser: [paddleocrvl]
retrieval_representation: [oracle]
text_retrievers: []
vision_retrievers: []
joints: []
k_values: []
joint_k_values: []
inference_text_retriever: none
inference_vision_retriever: none
inference_joint: false
reasoner_spec: [qwen3vl-2b-local]
quantization: [bf16]
visual_resolution: [med]
reasoner_representations: [T, TL, TLV, V]
prompt_modes: [none]
classifier: none
judge_spec: stub
