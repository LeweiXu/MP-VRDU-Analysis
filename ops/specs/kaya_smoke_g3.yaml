# G3 smoke: unanswerable + prompt sweep + classifier end-to-end on one V100 with
# the 2B reasoner and one unanswerable question per doc_type. Some cells may OOM
# (graceful per-cell failure + continuation).
task_name: G3_hallucination
run_tag: g3-smoke
dataset: [mmlongbench]
corpus: {scan: any, pool: unanswerable, sampling: {per_doc_type: 1, seed: 0}}
parser_dpi: 200
parser: [paddleocrvl]
retrieval_representation: [T]
text_retrievers: []
vision_retrievers: []
joints: []
k_values: [3]
joint_k_values: []
inference_text_retriever: bm25
inference_vision_retriever: none
inference_joint: false
reasoner_spec: [qwen3vl-2b-local]
quantization: [bf16]
visual_resolution: [med]
reasoner_representations: [TLV]
prompt_modes: [none, generic, targeted]
classifier: qwen3vl-2b-local
judge_spec: stub
