# Kaya real run: G1 oracle ladder, G2 retrieval (inference k-sweep + accuracy
# side-artifact), and G3 hallucination. All 8B, med resolution, paddleocrvl parser,
# stub judge (judge later with `python -m ops.judge`). G1/G2 sample 50 questions per
# native doc_type (whole documents); G3 runs the full unanswerable pool.
#
#     python -m ops.generate --spec ops/specs/kaya.yaml
#
# Each run is its own cache namespace (run_tag), so they never overwrite each other
# and can be judged/built one at a time.

base:
  corpus: {sampling: {per_doc_type: 50, seed: 0}}
  parser: paddleocrvl
  judge_spec: stub

runs:
  - task: G1_oracle_ladder
    run_tag: g1-doctype50
    reasoner_specs: [qwen3vl-8b-local]
    visual_resolution: med
    representations: [T, TL, TLV, V]

  - task: G2_retrieval
    run_tag: g2-doctype50
    reasoner_spec: qwen3vl-8b-local
    visual_resolution: med
    representations: [TLV, V]
    k_values: [1, 3, 5, 7, 10]

  - task: G3_hallucination
    run_tag: g3-full
    reasoner_spec: qwen3vl-8b-local
    visual_resolution: med
    corpus: {sampling: full}
