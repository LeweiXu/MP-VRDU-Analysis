# Unblocks: the RQ2 feasibility frontier (oom_frontier, vram_headroom) and every
# accuracy cell thinned by OOM, most of all the long-document V rung and the TLV rung
# where 130 of 847 questions never produced an answer. ~3.3k oom rows across all runs
# carry no accuracy, and they are not missing at random: OOM concentrates in multi-hop
# and long documents, so the surviving cells are an easier subset.
# Axis values are IDENTICAL to kaya_g1_representation_full.yaml. The only thing that
# changes is the card this runs on. Pair it with a --failed-only invocation so it
# retries just the oom cells rather than regenerating the whole grid.
# Cells: 245 oom cells for this run_tag (3388 if run as a full grid).
# Hardware: A100 or H100 (>=40GB). The point of the spec is the larger card.
# Caveat: --failed-only is interrupt-unsafe (experiments/engine/driver.py
# ::_prepare_failed_only, docs/HANDOFF.md step 4). A killed run can lose the skip set.
# Prefer a normal resume with --skip-oom if the job may be pre-empted.
task_name: G1_oracle_ladder
run_tag: g1-failed-only-a100
dataset: [mmlongbench]
corpus: {scan: any, pool: answerable, sampling: full}
parser_dpi: 200
parser: [paddleocrvl]
retrieval_representation: [oracle]
text_retrievers: []
vision_retrievers: []
joints: []
k_values: []
joint_k_values: []
inference_text_retriever: none
inference_vision_retriever: none
inference_joint: false
reasoner_spec: [qwen3vl-8b-local]
quantization: [bf16]
visual_resolution: [med]
reasoner_representations: [T, TL, TLV, V]
prompt_modes: [none]
classifier: none
