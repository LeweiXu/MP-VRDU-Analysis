# G3 re-run under the six-mode prompt set: abstention on the UNANSWERABLE pool.
# Same page selection as the original g3-hallucination-full (bm25 similarity,
# k=3), four rungs, but a NEW run_tag: the old tag's rows were generated with no
# delimiter and a flat 256 budget, and decode_budget/final_answer_delimiter are
# run_tag-scoped (never mixed within one tag). The old tag stays as-is: it feeds
# the legacy hallucination tables and the Stage-8 reconciliation anchors
# (none 16.9 / generic 10.7 / targeted 80.7 at TLV; grounded/abstain are
# byte-identical instructions, so their rates should reproduce those).
task_name: G3_hallucination
run_tag: g3-faithfulness-full
dataset: [mmlongbench]
corpus: {scan: any, pool: unanswerable, sampling: full}
parser_dpi: 200
parser: [paddleocrvl]
retrieval_representation: [T]
text_retrievers: []
vision_retrievers: []
joints: []
k_values: [3]
joint_k_values: []
inference_text_retriever: bm25
inference_vision_retriever: none
inference_joint: false
reasoner_spec: [qwen3vl-8b-local]
quantization: [bf16]
visual_resolution: [med]
reasoner_representations: [T, TL, TLV, V]
prompt_modes: [none, grounded, abstain, abstain_balanced, cot, extract_cot]
# The reasoning-bearing modes emit reasoning AND an answer; a 256 budget would
# truncate the answer away and read as "CoT hurts accuracy".
decode_budget: {default: 256, cot: 1024, extract_cot: 1024}
final_answer_delimiter: "Answer:"
classifier: none
