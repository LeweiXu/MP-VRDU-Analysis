# G2 smoke: retrieval benchmark + inference end-to-end on one V100 with the 2B
# reasoner and one question per doc_type, small k. qwen3-embedding / colqwen3 may
# OOM on 16 GB (their rows skip); TLV/V inference cells may OOM (graceful failure).
task_name: G2_retrieval
run_tag: g2-smoke
dataset: [mmlongbench]
corpus: {pool: answerable, sampling: {per_doc_type: 1, seed: 0}}
parser_dpi: 200
parser: [paddleocrvl]
retrieval_representation: [T, V]
text_retrievers: [bm25, bge-m3, qwen3-embedding]
vision_retrievers: [colmodernvbert, colqwen2.5, colqwen3]
joints: matched
k_values: [1, 3]
joint_k_values: [1, 3]
inference_text_retriever: bge-m3
inference_vision_retriever: colqwen2.5
inference_joint: true
reasoner_spec: [qwen3vl-2b-local]
quantization: [bf16]
visual_resolution: [med]
reasoner_representations: [TLV, V]
prompt_modes: [none]
classifier: none
judge_spec: stub
