# G2 recovery slice for the per-document-type Kaya smoke.

base:
  corpus: {sampling: {per_doc_type: 1, seed: 0}}
  dataset: mmlongbench
  parser: paddleocrvl
  judge_spec: stub

runs:
  - task: G2_retrieval
    run_tag: g2-perdoctype1-smoke
    retrieval:
      text_retrievers: [bm25, bge-m3, qwen3-embedding]
      vision_retrievers: [colmodernvbert, colqwen2.5, colqwen3]
      joints: matched
      k_values: [1]
      joint_k_values: [1]
    inference:
      reasoner_spec: qwen3vl-2b-local
      visual_resolution: med
      text_retriever: bm25
      vision_retriever: colqwen2.5
      joint: true
      k_values: [1]
      joint_k_values: [1]
      representations: [TLV]
