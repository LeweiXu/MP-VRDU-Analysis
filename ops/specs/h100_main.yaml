# Supervisor (H100) full run: the ideal grid we would run if compute were free.
# G1 sweeps size / family / quantization / resolution / parser (cross-product) over
# the oracle ladder; G2 is the full retrieval benchmark + inference; G3 the prompt
# sweep + classifier. 32B fits the 80 GB H100.
runs:

  - task_name: G1_oracle_ladder
    run_tag: g1
    dataset: [mmlongbench]
    corpus: {pool: answerable, sampling: {per_doc_type: 50, seed: 0}}
    parser_dpi: 200
    parser: [paddleocrvl, mineru, unlimited]
    retrieval_representation: [oracle]
    text_retrievers: []
    vision_retrievers: []
    joints: []
    k_values: []
    joint_k_values: []
    inference_text_retriever: none
    inference_vision_retriever: none
    inference_joint: false
    reasoner_spec: [qwen3vl-2b-local, qwen3vl-4b-local, qwen3vl-8b-local, qwen3vl-32b-local, internvl3-8b-local]
    quantization: [bf16, 8bit, 4bit]
    visual_resolution: [low, med, high]
    reasoner_representations: [T, TL, TLV, V]
    prompt_modes: [none]
    classifier: none
    judge_spec: stub

  - task_name: G2_retrieval
    run_tag: g2
    dataset: [mmlongbench]
    corpus: {pool: answerable, sampling: {per_doc_type: 50, seed: 0}}
    parser_dpi: 200
    parser: [paddleocrvl]
    retrieval_representation: [T, V]
    text_retrievers: [bm25, bge-m3, qwen3-embedding]
    vision_retrievers: [colmodernvbert, colqwen2.5, colqwen3]
    joints: matched
    k_values: [1, 3, 5, 7, 10]
    joint_k_values: [1, 3, 5]
    inference_text_retriever: bge-m3
    inference_vision_retriever: colqwen2.5
    inference_joint: true
    reasoner_spec: [qwen3vl-8b-local]
    quantization: [bf16]
    visual_resolution: [med]
    reasoner_representations: [TLV, V]
    prompt_modes: [none]
    classifier: none
    judge_spec: stub

  - task_name: G3_hallucination
    run_tag: g3
    dataset: [mmlongbench]
    corpus: {pool: unanswerable, sampling: full}
    parser_dpi: 200
    parser: [paddleocrvl]
    retrieval_representation: [T]
    text_retrievers: []
    vision_retrievers: []
    joints: []
    k_values: [3]
    joint_k_values: []
    inference_text_retriever: bm25
    inference_vision_retriever: none
    inference_joint: false
    reasoner_spec: [qwen3vl-8b-local]
    quantization: [bf16]
    visual_resolution: [med]
    reasoner_representations: [TLV]
    prompt_modes: [none, generic, targeted]
    classifier: qwen3vl-2b-local
    judge_spec: stub
