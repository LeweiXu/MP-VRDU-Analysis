# H100 main run: Qwen3-VL-8B over the full four-rung ladder (oracle pages), the
# whole answerable question set, at the deployment resolution. This is the
# headline G1 result.
#
#     python -m ops.generate --spec ops/specs/h100_main.yaml

base:
  corpus: {sampling: full}
  parser: paddleocrvl
  judge_spec: stub            # judge later with `python -m ops.judge`

runs:
  - task: G1_oracle_ladder
    run_tag: g1-8b
    reasoner_spec: qwen3vl-8b-local
    visual_resolution: med
    representations: [T, TL, TLV, V]
