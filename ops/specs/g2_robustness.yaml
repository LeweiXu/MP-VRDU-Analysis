# g2 (E2 selection) - robustness (distractor, +k design): questions BLOCKED by
# their gold count (corpus.hop is an exact count), fed ALL their gold pages
# plus k top-ranked non-gold distractors. Gold count is the blocking factor
# (one run per count); distractor count is the manipulated cell axis. Read
# DOWN a gold block for the dilution slope at constant evidence; comparisons
# are valid WITHIN a block, not across blocks (evidence and length both
# differ).
#
# d=0 is deliberately not run: all gold + no distractors IS the oracle
# condition, so every block's clean baseline already exists in
# g1-representation-full (the same questions' oracle rows, selected by gold
# count at analysis time). That reuse is exact, not approximate; the selection
# table reads it from the G1 cache.
runs:
  - task_name: G5_selection
    run_tag: g5b-gold1
    dataset: [mmlongbench]
    corpus: {scan: any, pool: answerable, sampling: full, hop: 1}
    parser_dpi: 200
    parser: [paddleocrvl]
    retrieval_representation: [T, V]
    text_retrievers: [bm25]
    vision_retrievers: [colqwen3]
    joints: []
    k_values: []
    joint_k_values: []
    inference_text_retriever: none
    inference_vision_retriever: none
    inference_joint: false
    page_set:
      ranking_source: [colqwen3, bm25]
      gold: {mode: all}
      distractor: {count: [1, 2]}
      on_insufficient_gold: exclude
      on_insufficient_distractors: pad_available
      on_no_gold: exclude
    reasoner_spec: [qwen3vl-8b-local]
    quantization: [bf16]
    visual_resolution: [med]
    reasoner_representations: [T, TL, TLV, V]
    prompt_modes: [none]
    classifier: none

