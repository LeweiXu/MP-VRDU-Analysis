# g2 (E2 selection) - robustness (distractor, +k design): hold the kept gold fixed and add k
# top-ranked non-gold pages on top. Gold count is a BLOCKING factor (one run
# per kept-gold count); distractor count is the manipulated cell axis. Read
# DOWN a gold block for the dilution slope at constant evidence; k=0 is that
# block's clean baseline. Total pages rise with k, so comparisons are valid
# WITHIN a gold block, not across blocks (evidence and length both differ).
#
# d=0 is deliberately not run here. The gold-1 block's clean baseline already
# exists as g2_sufficiency's keep-best run (identical rule, identical condition
# base pageset:r=<ranker>:g=keep_top-1:d=0, so re-running it would duplicate
# those cells under a second tag). The all-gold baseline is the G1 oracle
# ladder on the same hop:multi pool (all gold + no distractors IS oracle),
# which the selection table loads as its pivot row. The gold-2 and gold-3
# blocks therefore have NO same-evidence clean baseline: read their dilution
# slope from d=1 -> d=2 only, and never against the all-gold pivot (evidence
# count differs).
runs:
  - task_name: G5_selection
    run_tag: g5b-gold1
    dataset: [mmlongbench]
    corpus: {scan: any, pool: answerable, sampling: full, hop: multi}
    parser_dpi: 200
    parser: [paddleocrvl]
    retrieval_representation: [T, V]
    text_retrievers: [bm25]
    vision_retrievers: [colqwen3]
    joints: []
    k_values: []
    joint_k_values: []
    inference_text_retriever: none
    inference_vision_retriever: none
    inference_joint: false
    page_set:
      ranking_source: [colqwen3, bm25]
      gold: {mode: keep_top, count: 1}
      distractor: {count: [1, 2]}
      on_insufficient_gold: exclude
      on_insufficient_distractors: pad_available
      on_no_gold: exclude
    reasoner_spec: [qwen3vl-8b-local]
    quantization: [bf16]
    visual_resolution: [med]
    reasoner_representations: [T, TL, TLV, V]
    prompt_modes: [none]
    classifier: none

