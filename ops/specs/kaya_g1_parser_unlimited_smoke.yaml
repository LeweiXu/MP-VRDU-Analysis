# Smoke test for the Unlimited-OCR parser worker fix (1x V100).
# Two questions only, so the unlimited parser warms just their gold pages, then a
# 2B reasoner (fits one V100) reads the TL/TLV markdown. If the TL/TLV cells come
# back `ok` (no ParserCacheMiss), Unlimited-OCR is working end to end. Isolated
# *-smoke run_tag so it never touches the real g1-parser-full-unlimited cache.
task_name: G1_oracle_ladder
run_tag: g1-parser-unlimited-smoke
dataset: [mmlongbench]
corpus: {scan: any, pool: answerable, sampling: {limit: 2}}
parser_dpi: 200
parser: [unlimited]
retrieval_representation: [oracle]
text_retrievers: []
vision_retrievers: []
joints: []
k_values: []
joint_k_values: []
inference_text_retriever: none
inference_vision_retriever: none
inference_joint: false
reasoner_spec: [qwen3vl-2b-local]
quantization: [bf16]
visual_resolution: [med]
reasoner_representations: [TL, TLV]
prompt_modes: [none]
classifier: none
