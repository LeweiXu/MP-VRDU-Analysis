version: 1
name: g1-g2-g5-rerun
run_tag: yaml-g1-g2-g5-rerun
mode: full
dataset: mmlongbench

config:
  reasoner_spec: qwen3vl-8b-local
  max_tokens: 256
  visual_resolution: low
  per_bin_sample: 100
  sample_seed: 0
  k_values: [1, 3, 5, 7, 9]
  representations: [T, TL, TLV, V]

runs:
  # G1: oracle-page sufficiency grid for the primary 8B model.
  # The text channel uses Marker for digital-born docs and OCR for scanned docs
  # according to annotations/doc_labels.csv.
  - name: G1_sufficiency
    questions: {}
    models: [qwen3vl-8b-local]
    cells:
      conditions:
        - type: oracle
      representations: [T, TL, TLV, V]

  # G2: full model-family replication for InternVL over the paper rungs.
  - name: G2_family
    questions: {}
    models: [internvl3-8b-local]
    cells:
      conditions:
        - type: oracle
      representations: [T, TL, TLV, V]

  # G5: matched/cross retrieval with the implemented top-k sweep.
  # Keep reasoning at TLV for Table-6 compatibility: matched means
  # vision-retrieval -> TLV reasoning, cross means text-retrieval -> TLV
  # reasoning. Retrieval diagnostics are written to retrieval.jsonl.
  - name: G5_retrieval
    questions: {}
    models: [qwen3vl-8b-local]
    cells:
      conditions:
        - type: retrieved
          retriever: vision
          k: [1, 3, 5, 7, 9]
          name: retrieved_vision_k{k}
        - type: retrieved
          retriever: text
          k: [1, 3, 5, 7, 9]
          name: retrieved_text_k{k}
      representations: [TLV]
    side_artifacts:
      retrieval_eval: true
